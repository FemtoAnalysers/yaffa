# Parameters from CECA paper
ofile: source_cecapaper_3b.root
system: ppp
ncpu: 1
glob_timeout: 600
thread_timeout: 600

# ceca parameters
hadron_size: 0
hadron_slope: 0
arbitrary_mass: 469.13605 # m_proton / 2. um = MeV
eta_cut: 0.8
enable_resonances: true
frac_protons: 35.78
equalize_tau: true
femto_region: 1000
target_yield: 1000
remove_boost: false
equalize_tau: true
frac_prim:
    p: 35.78
mult: 3

# The following 3 parameters come from EPJC (2023) 83:590 aka CECA paper
disp: 0.176
hadr: 2.68
tau: 3.76

hadr_z: 0
hflc: 0
tau_prp: true
tflc: 0
thk: 0
fix_hadron: true
frag_beta: 0

# fit params
alpha: 0.99

mt_bins: [1020, 1140, 1200, 1260, 1380, 1560, 1860, 4500]
