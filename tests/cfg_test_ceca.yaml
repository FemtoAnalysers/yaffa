# Reproduce simple 1fm source with and remove lorentz boost
ofile: source.root
system: pp
ncpu: 1
glob_timeout: 60
thread_timeout: 60

# ceca parameters
hadron_size: 0
hadron_slope: 0
eta_cut: 0.8
enable_resonances: false
frac_protons: 35.78
equalize_tau: true
mult: 2
femto_region: 100
target_yield: 1000
remove_boost: true
equalize_tau: true
frac_prim:
    p: 35.78
mult: 2
disp: 1
hadr: 0
tau: 0
hadr_z: 0
hflc: 0
tau_prp: true
tflc: 0
thk: 0
fix_hadron: true
frag_beta: 0

# disp: 0.176
# hadr: 2.68
# tau: 3.76


# fit params
alpha: 0.99




